name: Release

# Two ways to run:
#   1. Push a version tag:  git tag v4.0.0 && git push origin v4.0.0
#   2. Manually from the GitHub UI: Actions tab -> "Release" -> "Run workflow"
# Each OS runner builds its native executables and electron-builder uploads
# them to a GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Pinned images: windows-2022 ships VS2022 (node-gyp recognises it;
        # windows-latest is now VS2026 which breaks the bundled node-gyp).
        os: [ubuntu-22.04, windows-2022]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      # node-gyp compiles better-sqlite3 for Electron's ABI; Python 3.12+ drops
      # distutils which node-gyp needs, so pin 3.11.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        env:
          # Provided automatically by Actions; lets electron-builder upload the
          # built artifacts to the release for this tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx --no-install electron-builder --publish always
