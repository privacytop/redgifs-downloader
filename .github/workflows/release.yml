name: Release

# Runs on:
#   1. Every push to main -> auto-releases v4.0.<run-number> (auto-incrementing)
#   2. A version tag (git tag v4.1.0 && git push origin v4.1.0) -> that version
#   3. Manually from the Actions tab -> "Release" -> "Run workflow"
# Each OS runner builds its native executables and electron-builder uploads
# them to a GitHub Release.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Pinned images: windows-2022 ships VS2022 (node-gyp recognises it;
        # windows-latest is now VS2026 which breaks the bundled node-gyp).
        os: [ubuntu-22.04, windows-2022]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      # node-gyp compiles better-sqlite3 for Electron's ABI; Python 3.12+ drops
      # distutils which node-gyp needs, so pin 3.11.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      # Version = the pushed tag (e.g. v4.1.0 -> 4.1.0), else 4.<run-number>.0
      # (semver needs three parts), which auto-increments on every push to main.
      # All matrix jobs in a run share github.run_number, so every OS publishes
      # the same version.
      - name: Set version
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="4.${{ github.run_number }}.0"
          fi
          echo "Building version $V"
          npm version "$V" --no-git-tag-version --allow-same-version

      - name: Build and publish
        env:
          # Provided automatically by Actions; lets electron-builder create the
          # release and upload the built artifacts to it.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx --no-install electron-builder --publish always
