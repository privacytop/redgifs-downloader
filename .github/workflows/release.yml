name: Release

# Runs on:
#   1. Every push to main -> auto-releases 4.<push>.<commits>: minor = the
#      newest stable tag's minor + 1 (one bump per release, i.e. a push
#      counter that can't reset), patch = total commit count on HEAD
#   2. A version tag (git tag v4.50.0 && git push origin v4.50.0) -> that version
#   3. Manually from the Actions tab -> "Release" -> "Run workflow"
#
# Structure: a `prepare` job computes the version ONCE and creates the GitHub
# release up front, then the OS matrix builds and uploads artifacts into it.
# This is deliberate — when the matrix jobs computed versions themselves, the
# first publisher created the release tag, and any re-run or slower runner
# then saw its own commit as "already tagged" and skipped, leaving releases
# permanently missing that OS's artifacts. Versions also derive from git tags,
# not github.run_number: the run counter silently resets when the workflow
# file is renamed/recreated (that's how 4.0.0 shipped right after 4.9.0).
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags — the version is derived from the newest tag.
          fetch-depth: 0

      - name: Compute version
        id: ver
        shell: bash
        run: |
          TAG_AT_HEAD=$(git tag --points-at HEAD --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          elif [ -n "$TAG_AT_HEAD" ]; then
            # HEAD is already tagged (a previous run of this commit released
            # it, or a human tagged it): REUSE that version instead of minting
            # a new one — the release-create below is idempotent, so re-runs
            # can repair a release that's missing one OS's artifacts.
            V="${TAG_AT_HEAD#v}"
            echo "HEAD already tagged $TAG_AT_HEAD — reusing its version."
          else
            # 4.<push>.<commits> — the "push number" is the newest stable
            # tag's minor + 1 rather than github.run_number, which silently
            # resets when the workflow file is renamed/recreated. Every
            # release bumps the minor by one, so it counts pushes; the patch
            # is the total commit count on HEAD (monotonic, and identical for
            # every re-run of the same commit). Prerelease suffixes
            # (v4.10.0-rc.1) are filtered: versionsort ranks them above their
            # release and their patch field breaks the arithmetic.
            LATEST=$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
            if [ -n "$LATEST" ]; then
              BASE=${LATEST#v}
              MAJOR=${BASE%%.*}
              REST=${BASE#*.}
              MINOR=$(( ${REST%%.*} + 1 ))
            else
              # No stable tag reachable (fresh fork / wiped tags): keep going
              # from the known floor instead of crashing on a missing ref.
              MAJOR=4
              MINOR=10
            fi
            V="$MAJOR.$MINOR.$(git rev-list HEAD --count)"
          fi
          echo "Version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      # Create the release once, before any build exists — the matrix jobs only
      # upload into it, so two runners can't race to create the same release
      # (HTTP 422) and re-runs of a failed OS can still repair the release.
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          if gh release view "v$V" > /dev/null 2>&1; then
            echo "Release v$V already exists — matrix will (re)upload artifacts."
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            gh release create "v$V" --title "v$V" --notes "Automated release v$V"
          else
            gh release create "v$V" --title "v$V" --notes "Automated release v$V" --target "$GITHUB_SHA"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        # Pinned images: windows-2022 ships VS2022 (node-gyp recognises it;
        # windows-latest is now VS2026 which breaks the bundled node-gyp).
        os: [ubuntu-22.04, windows-2022]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      # node-gyp compiles better-sqlite3 for Electron's ABI; Python 3.12+ drops
      # distutils which node-gyp needs, so pin 3.11.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Set version
        shell: bash
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build and publish
        env:
          # Provided automatically by Actions; lets electron-builder upload the
          # built artifacts to the release `prepare` created.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx --no-install electron-builder --publish always

  # Android APK — the Capacitor app in mobile/. Builds the same version as the
  # desktop artifacts and uploads into the same release. Signs with the repo
  # keystore secrets when present; unsigned forks still build (debug key).
  android:
    needs: prepare
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            mobile/package-lock.json
            packages/core/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets + sync Android
        run: npm run build && npx cap sync android

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK
        working-directory: mobile/android
        env:
          ANDROID_VERSION_NAME: ${{ needs.prepare.outputs.version }}
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && format('{0}/release.keystore', runner.temp) || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # versionCode: major*1e6 + minor*1e3 + patch (monotonic for <1000 each)
          V="${ANDROID_VERSION_NAME}"
          IFS='.' read -r MA MI PA <<< "$V"
          export ANDROID_VERSION_CODE=$(( MA*1000000 + MI*1000 + PA ))
          ./gradlew assembleRelease --no-daemon
          mv app/build/outputs/apk/release/app-release.apk \
             "$RUNNER_TEMP/RedLoader-${V}.apk"

      - name: Upload APK to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ needs.prepare.outputs.version }}" "$RUNNER_TEMP/RedLoader-${{ needs.prepare.outputs.version }}.apk" --clobber
