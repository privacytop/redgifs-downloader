name: Release

# Two independent release tracks — desktop (Electron) and android (Capacitor).
# Each builds and releases ONLY when its own code changed, with its own version
# lineage and its own GitHub release tag namespace:
#
#   * Desktop: paths desktop/** or packages/core/** -> release v<X.Y.Z>
#   * Android: paths mobile/**  or packages/core/** -> release android-v<X.Y.Z>
#   (packages/core is shared, so a core change ships on BOTH tracks.)
#
# Triggers:
#   1. Push to main -> builds whichever track(s) the push touched.
#   2. Tag vX.Y.Z (desktop) / android-vX.Y.Z -> that track at that exact version.
#   3. workflow_dispatch -> builds both tracks.
#
# Per track a `*-prepare` job computes the version ONCE (own tag's minor + 1,
# patch = commit count touching that track's paths) and creates the release up
# front; the build job(s) only upload into it (so re-runs / slow runners can't
# leave a release missing an artifact). Versions derive from git tags, never
# github.run_number (that silently resets when the workflow file is recreated).
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'android-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---- change detection: which track(s) does this run touch? -----------------
  changes:
    runs-on: ubuntu-22.04
    outputs:
      desktop: ${{ steps.detect.outputs.desktop }}
      android: ${{ steps.detect.outputs.android }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed tracks
        id: detect
        shell: bash
        run: |
          DESKTOP=false
          ANDROID=false
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            # A track's own tag builds only that track.
            case "$GITHUB_REF_NAME" in
              android-v*) ANDROID=true ;;
              v*)         DESKTOP=true ;;
            esac
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            DESKTOP=true; ANDROID=true
          else
            # Branch push: diff the pushed range. `before` is all-zeros on the
            # first push to a branch — treat that as "build both".
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              DESKTOP=true; ANDROID=true
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$GITHUB_SHA")
              echo "$CHANGED" | grep -qE '^(desktop/|packages/core/)' && DESKTOP=true
              echo "$CHANGED" | grep -qE '^(mobile/|packages/core/)'  && ANDROID=true
            fi
          fi
          echo "desktop=$DESKTOP" >> "$GITHUB_OUTPUT"
          echo "android=$ANDROID" >> "$GITHUB_OUTPUT"
          echo "desktop=$DESKTOP android=$ANDROID"

  # ==== DESKTOP track =========================================================
  desktop-prepare:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute desktop version
        id: ver
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            # `|| true`: with pipefail set, a no-match grep (no tags yet) or head
            # closing the pipe (SIGPIPE) would otherwise abort the step.
            TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
            if [ -n "$TAG" ]; then
              BASE=${TAG#v}; MAJOR=${BASE%%.*}; REST=${BASE#*.}; MINOR=$(( ${REST%%.*} + 1 ))
            else
              MAJOR=4; MINOR=10
            fi
            # patch = commits that touched the desktop or shared-core code
            PATCH=$(git rev-list HEAD --count -- desktop packages/core)
            V="$MAJOR.$MINOR.$PATCH"
          fi
          echo "Desktop version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Create desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          if gh release view "v$V" > /dev/null 2>&1; then
            echo "v$V exists — build will (re)upload."
          else
            gh release create "v$V" --title "Desktop v$V" \
              --notes "Automated desktop release v$V" --target "$GITHUB_SHA"
          fi

  desktop-build:
    needs: desktop-prepare
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 ships VS2022 (windows-latest is VS2026 which breaks the
        # bundled node-gyp that compiles better-sqlite3).
        os: [ubuntu-22.04, windows-2022]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: npm ci
      - name: Set version
        shell: bash
        run: npm version "${{ needs.desktop-prepare.outputs.version }}" --no-git-tag-version --allow-same-version
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx --no-install electron-builder --publish always

  # ==== ANDROID track =========================================================
  android-prepare:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute android version
        id: ver
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            V="${GITHUB_REF_NAME#android-v}"
          else
            # `|| true`: with pipefail set, a no-match grep (no tags yet) or head
            # closing the pipe (SIGPIPE) would otherwise abort the step.
            TAG=$(git tag --list 'android-v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^android-v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
            if [ -n "$TAG" ]; then
              BASE=${TAG#android-v}; MAJOR=${BASE%%.*}; REST=${BASE#*.}; MINOR=$(( ${REST%%.*} + 1 ))
            else
              MAJOR=1; MINOR=0
            fi
            PATCH=$(git rev-list HEAD --count -- mobile packages/core)
            V="$MAJOR.$MINOR.$PATCH"
          fi
          echo "Android version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Create android release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          if gh release view "android-v$V" > /dev/null 2>&1; then
            echo "android-v$V exists — build will (re)upload."
          else
            gh release create "android-v$V" --title "Android v$V" \
              --notes "Automated Android release v$V" --target "$GITHUB_SHA"
          fi

  android-build:
    needs: android-prepare
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: mobile
    # Secrets can't be referenced from `if:` expressions, so surface them as
    # job env — `if:` and the signing steps read env.* instead.
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            mobile/package-lock.json
            packages/core/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install dependencies
        run: npm ci
      - name: Build web assets + sync Android
        run: npm run build && npx cap sync android
      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
      - name: Build release APK
        working-directory: mobile/android
        env:
          ANDROID_VERSION_NAME: ${{ needs.android-prepare.outputs.version }}
        run: |
          # versionCode: major*1e8 + minor*1e4 + patch (patch is a commit count,
          # grows slowly, so the 10k slot has years of headroom).
          V="${ANDROID_VERSION_NAME}"
          IFS='.' read -r MA MI PA <<< "$V"
          export ANDROID_VERSION_CODE=$(( MA*100000000 + MI*10000 + PA ))
          ./gradlew assembleRelease --no-daemon
          mv app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/RedLoader-${V}.apk"
      - name: Upload APK to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "android-v${{ needs.android-prepare.outputs.version }}" "$RUNNER_TEMP/RedLoader-${{ needs.android-prepare.outputs.version }}.apk" --clobber
